<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
        }

        .header h1 {
            font-size: 30px;
        }

        /* DASHBOARD LAYOUT */
        .dashboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* GLASS CARD */
        .glass-card {
            width: 800px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .profile-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .info-group h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .info-group p {
            font-size: 18px;
            opacity: 0.8;
        }

        .details-group {
            text-align: right;
        }

        .details-group p {
            margin: 5px 0;
            font-weight: 500;
        }

        /* BUTTONS */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-primary {
            background: #00c6ff;
            color: white;
        }

        .btn-primary:hover {
            background: #0072ff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* EDIT FORM */
        #editForm {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .success-msg {
            color: #72ffd1;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>

    <script>
        function toggleEdit() {
            var form = document.getElementById("editForm");
            if (form.style.display === "none" || form.style.display === "") {
                form.style.display = "block";
            } else {
                form.style.display = "none";
            }
        }
    </script>
</head>

<body>

    <div class="header">
        <h1>Project Platform</h1>
        <a href="/auth/logout" style="color: white; text-decoration: none;">Logout</a>
    </div>

    <div class="dashboard-container">
        <div class="glass-card">
            <div class="profile-section">
                <div class="info-group">
                    <h2 th:text="${faculty.name}">John Doe</h2>
                    <p th:text="${faculty.email}">john@university.edu</p>
                    <p><span class="badge"
                            style="background: #ff7e5f; padding: 2px 10px; border-radius: 15px; font-size: 12px;"
                            th:text="${faculty.role}">FACULTY</span></p>
                </div>
                <div class="details-group">
                    <p th:text="${faculty.designation ?: '[No Designation]'}">Professor</p>
                    <p th:text="${faculty.department ?: '[No Department]'}">Computer Science</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-primary" onclick="alert('Viewing all projects...')">View Projects</button>
                <button class="btn-primary" onclick="alert('Comment functionality logic would go here.')">Comment on
                    Project</button>
                <button class="btn-secondary" onclick="toggleEdit()">Edit Details</button>
            </div>

            <div id="editForm">
                <h3>Update Profile Details</h3>
                <form action="/faculty/update" method="post">
                    <input type="hidden" name="email" th:value="${faculty.email}">
                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" name="designation" th:value="${faculty.designation}"
                            placeholder="ex: Professor, Lecturer" required>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" name="department" th:value="${faculty.department}"
                            placeholder="ex: Computer Science" required>
                    </div>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
            </div>

            <p th:if="${param.success}" class="success-msg">Details updated successfully!</p>
        </div>
    </div>

</body>

</html>
