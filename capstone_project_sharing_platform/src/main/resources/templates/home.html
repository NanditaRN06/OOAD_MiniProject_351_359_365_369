<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Capstone Project Platform</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 60px;
            background: rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .hero {
            text-align: center;
            margin-top: 120px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            color: #e0e0e0;
        }

        .buttons {
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #00c6ff;
            color: black;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid white;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">Capstone Platform</div>
        <div class="nav-links">
            <a href="/auth/login">Login</a>
            <a href="/auth/register">Sign Up</a>
        </div>
    </div>

    <div class="hero">
        <h1>Welcome to Capstone Project Sharing Platform</h1>
        <p>Collaborate, Share and Explore Innovative Student Projects</p>

        <div class="buttons">
            <a href="/auth/login" class="btn btn-primary">Login</a>
            <a href="/auth/register" class="btn btn-secondary">Create Account</a>
        </div>
    </div>

</body>
</html>
