<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Submit Feedback</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #f3f4f6;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #d1d5db;
        }
        input, select, textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #111827;
            font-size: 16px;
        }
        button {
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Submit Feedback</h2>
        <form th:action="@{/student/feedback}" method="post">
            <input type="hidden" name="email" th:value="${email}">
            
            <label for="subjectId">Select Subject:</label>
            <select name="subjectId" id="subjectId" required>
                <option value="" disabled selected>Select a subject</option>
                <option th:each="subject : ${subjects}" 
                        th:value="${subject.id}" 
                        th:text="${subject.name}"></option>
            </select>

            <label for="relevance">Relevance (1-10):</label>
            <input type="number" name="relevance" id="relevance" min="1" max="10" required>

            <label for="gradingPattern">Grading Pattern:</label>
            <input type="text" name="gradingPattern" id="gradingPattern" required placeholder="E.g., Mid-sem, End-sem, Assignments">

            <label for="resources">Resources Provided:</label>
            <textarea name="resources" id="resources" rows="3" required placeholder="Mention helpful resources..."></textarea>

            <label for="difficulty">Difficulty Level:</label>
            <select name="difficulty" id="difficulty" required>
                <option value="EASY">EASY</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HARD">HARD</option>
            </select>

            <button type="submit">Submit Feedback</button>
        </form>
        <a th:href="@{'/auth/dashboard?email=' + ${email}}" style="text-decoration: none;">
            <button type="button" style="width: 100%; background: rgba(255,255,255,0.2); margin-top: 10px;">Go to Dashboard</button>
        </a>
    </div>
</body>
</html>
