<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Projects</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: white;
            padding: 30px;
        }

        .project-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select, input {
            width: 50%;
            padding: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: white;
        }
    </style>
</head>

<body>

<div style="margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;">
    <h2>Search Projects</h2>
    <form action="/search" method="get" style="display: flex; gap: 10px; margin-top: 10px;">
        <input type="hidden" name="email" th:value="${email}">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by title, domain, tech..." style="width: 70%;">
        <button type="submit">Search</button>
        <a th:href="@{'/search?email=' + ${email}}">
            <button type="button" style="background: #ff7e5f;">Clear</button>
        </a>
    </form>
</div>

<a th:href="@{'/auth/dashboard?email=' + ${email}}" style="text-decoration: none; display: inline-block; margin-bottom: 20px;">
    <button type="button" style="padding: 10px 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold;">&larr; Go to Dashboard</button>
</a>

<div th:each="project : ${projects}" class="project-card">

    <h3 th:text="${project.title}"></h3>
    <p><b>Domain:</b> <span th:text="${project.domain}"></span></p>
     <a th:href="@{'/projects/' + ${project.id} + '?email=' + ${email}}">
        <button type="button">View Details</button>
    </a>

    <form action="/comments" method="post">


    <input type="hidden" name="projectId" th:value="${project.id}">
    <input type="hidden" name="email" th:value="${email}">

    <!-- Text input -->
    <input type="text" name="content" placeholder="Write comment">

    <!-- Hidden type (default TEXT) -->
    <input type="hidden" name="type" value="TEXT">

    <button type="submit">Comment</button>
</form>
</div>

<script>
    document.querySelectorAll(".typeSelect").forEach((select, index) => {

        const ratingField = document.querySelectorAll(".ratingField")[index];
        const contentField = document.querySelectorAll(".contentField")[index];

        function update() {
            if (select.value === "RATING") {
                ratingField.style.display = "block";
                ratingField.disabled = false;

                contentField.disabled = true;
                contentField.style.display = "none";
            } else {
                ratingField.style.display = "none";
                ratingField.disabled = true;

                contentField.disabled = false;
                contentField.style.display = "block";
            }
        }

        select.addEventListener("change", update);
        update(); // initial
    });
</script>

</body>
</html>
